  <div class="panel">

<script type="module">
import * as THREE from 'three';

/* ============================================================
   SchooMy World v2.0 — oVice全体図の街構造を再現
   交差点を中心に：北東=ビル街(ホテル)／東=噴水プラザ／
   北西=屋外カフェ＋ステージ棟／中央北西=ティールの屋外ワークスペース／
   西=フードトラック通り／南西=公園・菜園／南東=イベントステージ
   ============================================================ */

const C = {
  sky:0x8ed1f5, pave:0xb9bdbf, grass:0x7ecb5a, grassD:0x69b54a,
  plaza:0xc9cccf, diamond:0xd6d9db, border:0x8e9496,
  asphalt:0x565b5f, dash:0xf2f4f4, walk:0xc4c8ca,
  stone:0xcfd4d7, basin:0x1b5e66, water:0x3fe6de, jet:0x6ff0ea,
  topiary:0x46c25a, shrub:0x7fe08c,
  palmTrunk:0x9a7b4f, palmLeaf:0x2fae52, treeTrunk:0x7a5a38,
  truckRed:0xd8362f, white:0xf5f5f2, orange:0xe88a0a,
  lamp:0x3c4448, glass:0x9ad2ea, teal:0x3aaba8, tealD:0x2a8a88,
  wood:0x8a5a33, woodL:0xb07a45, pinkFence:0xf2a7c3, soil:0x6e4a2e,
  stage:0x2d3439, screen:0xf2f2f2, yellow:0xf0c54a
};
const TREE_GREENS = [0x3fae4f, 0x55c25e, 0x2f9a47, 0x6fcf6a];
const TOWER_PALETTE = [0xeef0f2,0xd9dde0,0xf2f3f4,0xcfd6da,0xe7e3d8,0xdfe3e6,0xe4e7ea];
const SHOP_PALETTE  = [0xf5d9a8,0xe8a87c,0xa8d8ea,0xead7c3,0xbfd8b8,0x9cc4d8];
const AWNING_PALETTE= [0xd8362f,0x3aaba8,0xe88a0a,0x2e8ec4];

/* ---------- renderer / scene ---------- */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.sky);
scene.fog = new THREE.Fog(C.sky, 100, 380);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 700);
camera.rotation.order = 'YXZ';

scene.add(new THREE.HemisphereLight(0xcdeaff, 0x9cc28b, 0.95));
const sun = new THREE.DirectionalLight(0xfff3df, 1.25);
sun.position.set(80, 110, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-140; sun.shadow.camera.right=140;
sun.shadow.camera.top=140;   sun.shadow.camera.bottom=-140;
sun.shadow.camera.near=10;   sun.shadow.camera.far=380;
sun.shadow.bias=-0.0008; sun.shadow.radius=4;
scene.add(sun);

/* ---------- helpers ---------- */
const lam = c => new THREE.MeshLambertMaterial({ color:c });
const bas = c => new THREE.MeshBasicMaterial({ color:c });
const colliders = [];
const circleCol = (x,z,r)=>colliders.push({t:'c',x,z,r});
const boxCol = (x0,x1,z0,z1)=>colliders.push({t:'b',x0,x1,z0,z1});
const dummy = new THREE.Object3D();
const rot2 = (dx,dz,ry)=>[Math.cos(ry)*dx + Math.sin(ry)*dz, -Math.sin(ry)*dx + Math.cos(ry)*dz];

// InstancedMesh コレクタ
function collector(){
  return {
    mats:[], cols:[],
    add(x,y,z,ry=0,sx=1,sy=1,sz=1,color=null){
      dummy.position.set(x,y,z); dummy.rotation.set(0,ry,0); dummy.scale.set(sx,sy,sz);
      dummy.updateMatrix(); this.mats.push(dummy.matrix.clone()); this.cols.push(color);
    },
    build(geo, mat, {shadow=false, parent=scene}={}){
      const n = this.mats.length; if(!n) return null;
      const m = new THREE.InstancedMesh(geo, mat, n);
      this.mats.forEach((mx,i)=>{
        m.setMatrixAt(i,mx);
        if(this.cols[i]!==null && this.cols[i]!==undefined)
          m.setColorAt(i, new THREE.Color(this.cols[i]));
      });
      if(shadow) m.castShadow = true;
      m.receiveShadow = true;
      parent.add(m); return m;
    }
  };
}
function box(w,h,d,c,x,y,z,{ry=0,shadow=true,recv=true,parent=scene,mat=null}={}){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat||lam(c));
  m.position.set(x,y,z); m.rotation.y = ry;
  m.castShadow = shadow; m.receiveShadow = recv; parent.add(m); return m;
}

function textTexture(text,{bg='#f5f5f2',fg='#d8362f',stripe=null,stripe2='#f5f5f2',font='bold 64px Meiryo, sans-serif'}={}){
  const cv = document.createElement('canvas'); cv.width=512; cv.height=256;
  const g = cv.getContext('2d');
  g.fillStyle=bg; g.fillRect(0,0,512,256);
  if(stripe){ for(let x=0;x<512;x+=64){ g.fillStyle=stripe; g.fillRect(x,0,32,56);} 
    g.fillStyle=stripe2; }
  g.fillStyle=fg; g.font=font; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(text, 256, stripe?150:128);
  const tx = new THREE.CanvasTexture(cv); tx.colorSpace = THREE.SRGBColorSpace; return tx;
}
function stripeTexture(c1,c2){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64;
  const g=cv.getContext('2d');
  g.fillStyle=c2; g.fillRect(0,0,256,64);
  for(let x=0;x<256;x+=32){ g.fillStyle=c1; g.fillRect(x,0,16,64); }
  const tx=new THREE.CanvasTexture(cv); tx.colorSpace=THREE.SRGBColorSpace;
  tx.wrapS=THREE.RepeatWrapping; tx.repeat.x=2; return tx;
}

/* ============================================================
   地面（ゾーンごとの色分け）
   ============================================================ */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(800,800), lam(C.pave));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

function patch(w,d,x,z,c,y=0.015){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d), lam(c));
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z); m.receiveShadow=true; scene.add(m);
}
patch(125,125,-75,75,C.grass);          // 南西＝公園
patch(120,110,-72,-70,C.grass);         // 北西＝カフェの芝生
patch(44,30,-58,-42,0xc8cccd,0.03);     // カフェのテラス舗装
patch(70,16,-48,16,0xb2b6a4,0.03);      // 西＝フードトラック帯
patch(40,26,8,32,0xc2c6c8,0.03);        // 南＝屋台まわり
patch(64,52,52,80,0xb6babc,0.03);       // 南東＝イベント前広場

/* ============================================================
   道路（東西＝Road A／南北＝Road B）＋歩道・横断歩道・街灯
   ============================================================ */
function road(w,l,x,z,ry){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.04,l), lam(C.asphalt));
  m.position.set(x,0.02,z); m.rotation.y=ry; m.receiveShadow=true; scene.add(m);
}
road(10,300, 0,0, Math.PI/2);  // Road A：東西
road(10,300, 0,0, 0);          // Road B：南北

const dashC = collector();
for(let x=-148;x<150;x+=5){ if(Math.abs(x)>8) dashC.add(x,0.05,0,Math.PI/2); }
for(let z=-148;z<150;z+=5){ if(Math.abs(z)>8) dashC.add(0,0.05,z,0); }
dashC.build(new THREE.BoxGeometry(0.28,0.02,2.2), lam(C.dash));

const zebraC = collector();
for(let i=0;i<6;i++){
  zebraC.add( 8.6+i*1.24, 0.05, 0, 0, 1,1,1);   // 東口
  zebraC.add(-8.6-i*1.24, 0.05, 0, 0, 1,1,1);   // 西口
}
zebraC.build(new THREE.BoxGeometry(0.62,0.02,9.4), lam(C.dash));
const zebraC2 = collector();
for(let i=0;i<6;i++){
  zebraC2.add(0,0.05,  8.6+i*1.24);
  zebraC2.add(0,0.05, -8.6-i*1.24);
}
zebraC2.build(new THREE.BoxGeometry(9.4,0.02,0.62), lam(C.dash));

function sidewalk(w,l,x,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.08,l), lam(C.walk));
  m.position.set(x,0.04,z); m.receiveShadow=true; scene.add(m);
}
sidewalk(300,3,0,-6.5); sidewalk(300,3,0,6.5);
sidewalk(3,300,-6.5,0); sidewalk(3,300,6.5,0);

// 街灯
const lampPos=[];
for(let x=-140;x<150;x+=24){ if(Math.abs(x)>10){ lampPos.push([x,-7.6]); lampPos.push([x+12,7.6]); } }
for(let z=-140;z<150;z+=24){ if(Math.abs(z)>10){ lampPos.push([-7.6,z]); lampPos.push([7.6,z+12]); } }
const poleC=collector(), headC=collector();
lampPos.forEach(p=>{ poleC.add(p[0],2.3,p[1]); headC.add(p[0],4.75,p[1]); circleCol(p[0],p[1],0.32); });
poleC.build(new THREE.CylinderGeometry(0.08,0.11,4.6,7), lam(C.lamp), {shadow:true});
headC.build(new THREE.SphereGeometry(0.26,10,8), bas(0xfff0c0));

// 信号機（交差点2基）
[[7.4,-7.4,Math.PI*0.75],[-7.4,7.4,-Math.PI*0.25]].forEach(([x,z,ry])=>{
  box(0.18,5.6,0.18,C.lamp,x,2.8,z);
  const head=box(0.5,1.3,0.35,0x23282b,x,5.0,z,{ry});
  [[0.38,0xe04438],[0,0xf0c54a],[-0.38,0x3fae4f]].forEach(([dy,c])=>{
    const l=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), bas(c));
    l.position.set(0,dy,0.2); head.add(l);
  });
  circleCol(x,z,0.3);
});

/* ============================================================
   噴水プラザ（東＝Road Aの南側）
   ============================================================ */
const PX=40, PZ=28;
const plazaG = new THREE.Group(); plazaG.position.set(PX,0,PZ); scene.add(plazaG);

const plazaBase = box(36,0.1,36,C.plaza,0,0.05,0,{parent:plazaG,shadow:false});
const borderSq  = box(26.4,0.06,26.4,C.border,0,0.13,0,{parent:plazaG,ry:Math.PI/4,shadow:false});
const diamondSq = box(25.2,0.06,25.2,C.diamond,0,0.17,0,{parent:plazaG,ry:Math.PI/4,shadow:false});

box(8,0.9,8,C.basin,0,0.45,0,{parent:plazaG});
const waterSurf = new THREE.Mesh(new THREE.PlaneGeometry(7.3,7.3),
  new THREE.MeshBasicMaterial({color:C.water,transparent:true,opacity:0.95}));
waterSurf.rotation.x=-Math.PI/2; waterSurf.position.y=0.91; plazaG.add(waterSurf);

[{r:2.7,h:0.55,y:0.90},{r:2.0,h:0.85,y:1.45},{r:1.3,h:0.85,y:2.30},{r:0.65,h:0.85,y:3.15}]
.forEach(t=>{
  const c=new THREE.Mesh(new THREE.CylinderGeometry(t.r,t.r*1.06,t.h,20), lam(C.stone));
  c.position.y=t.y+t.h/2; c.castShadow=true; c.receiveShadow=true; plazaG.add(c);
});
const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.32,0.4,12), lam(C.stone));
cap.position.y=4.18; cap.castShadow=true; plazaG.add(cap);
[{r:2.45,y:1.48},{r:1.78,y:2.33},{r:1.12,y:3.18}].forEach(o=>{
  const ring=new THREE.Mesh(new THREE.TorusGeometry(o.r,0.07,8,28),
    new THREE.MeshBasicMaterial({color:C.water,transparent:true,opacity:0.85}));
  ring.rotation.x=Math.PI/2; ring.position.y=o.y; plazaG.add(ring);
});

const jetCurves=[];
const jetMat=new THREE.MeshBasicMaterial({color:C.jet,transparent:true,opacity:0.8});
for(let k=0;k<8;k++){
  const a=k/8*Math.PI*2, c=Math.cos(a), s=Math.sin(a);
  const curve=new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(0.30*c,4.20,0.30*s),
    new THREE.Vector3(1.90*c,4.95,1.90*s),
    new THREE.Vector3(3.25*c,0.95,3.25*s));
  jetCurves.push(curve);
  plazaG.add(new THREE.Mesh(new THREE.TubeGeometry(curve,18,0.075,6,false), jetMat));
}
const P_PER=12, P_N=jetCurves.length*P_PER;
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(P_N*3),3));
const particles=new THREE.Points(pGeo,
  new THREE.PointsMaterial({color:0xc8fffb,size:0.16,transparent:true,opacity:0.95}));
plazaG.add(particles);
circleCol(PX,PZ,5.3);

// トピアリー
const tpT=collector(), tpB=collector(), tpP=collector();
for(let k=0;k<8;k++){
  const a=(k+0.5)/8*Math.PI*2, x=Math.cos(a)*6.9, z=Math.sin(a)*6.9;
  tpT.add(x,0.55,z); tpB.add(x,1.55,z); tpP.add(x,0.30,z);
  circleCol(PX+x,PZ+z,0.95);
}
tpT.build(new THREE.CylinderGeometry(0.10,0.13,0.7,8), lam(C.palmTrunk), {parent:plazaG});
tpB.build(new THREE.IcosahedronGeometry(0.85,1), lam(C.topiary), {shadow:true,parent:plazaG});
tpP.build(new THREE.CylinderGeometry(0.32,0.38,0.35,10), lam(0xb9bdbf), {parent:plazaG});

// 四隅の植え込み
const shrubC=collector();
[[13,13],[-13,13],[13,-13],[-13,-13]].forEach(([bx,bz])=>{
  box(5.4,0.34,5.4,C.border,bx,0.27,bz,{parent:plazaG});
  box(4.9,0.1,4.9,C.grass,bx,0.47,bz,{parent:plazaG,shadow:false});
  [[0,0],[1.4,1.2],[-1.4,1.1],[1.2,-1.4],[-1.3,-1.2]].forEach(([dx,dz])=>{
    shrubC.add(bx+dx,0.85,bz+dz,Math.random()*3,1,0.82,1);
  });
  boxCol(PX+bx-2.7,PX+bx+2.7,PZ+bz-2.7,PZ+bz+2.7);
});
shrubC.build(new THREE.IcosahedronGeometry(0.62,1), lam(C.shrub), {shadow:true,parent:plazaG});

/* ============================================================
   トラック汎用ビルダー
   ============================================================ */
function makeTruck({cargoColor=C.white, cabColor=C.truckRed, sideTex=null,
                    cargoH=2.2, len=4.2, awning=null}={}){
  const g=new THREE.Group();
  const whiteMat=lam(cargoColor);
  let mats=whiteMat;
  if(sideTex){
    const sm=new THREE.MeshLambertMaterial({map:sideTex});
    mats=[sm,sm,whiteMat,whiteMat,whiteMat,whiteMat];
  }
  const cargo=new THREE.Mesh(new THREE.BoxGeometry(2.2,cargoH,len), mats);
  cargo.position.set(0,0.75+cargoH/2,0.9); cargo.castShadow=true; g.add(cargo);
  const cab=box(2.1,1.45,1.7,cabColor,0,1.32,0.9-len/2-1.0,{parent:g});
  const ws=box(1.9,0.62,0.1,0x6fb6d8,0,1.62,0.9-len/2-1.85,{parent:g,shadow:false});
  box(2.15,0.3,0.25,0xd9dcde,0,0.62,0.9-len/2-1.9,{parent:g,shadow:false});
  const wg=new THREE.CylinderGeometry(0.45,0.45,0.34,14); wg.rotateZ(Math.PI/2);
  [[-1.05,0.9-len/2-1.05],[1.05,0.9-len/2-1.05],[-1.05,0.9+len/2-0.6],[1.05,0.9+len/2-0.6]]
  .forEach(([wx,wz])=>{
    const w=new THREE.Mesh(wg, lam(0x23282b));
    w.position.set(wx,0.45,wz); w.castShadow=true; g.add(w);
  });
  if(awning){
    const aw=new THREE.Mesh(new THREE.PlaneGeometry(len*0.8,1.4),
      new THREE.MeshLambertMaterial({map:awning,side:THREE.DoubleSide}));
    aw.rotation.y=Math.PI/2; aw.rotation.x=-0.5;
    aw.position.set(1.55,0.75+cargoH+0.2,0.9);
    aw.castShadow=true; g.add(aw);
  }
  return g;
}
function placeTruck(g,x,z,heading){ // heading: 'N','S','E','W'
  const ry={N:0,S:Math.PI,E:-Math.PI/2,W:Math.PI/2}[heading];
  g.position.set(x,0,z); g.rotation.y=ry; scene.add(g);
  const L=3.6, W=1.4;
  if(heading==='N'||heading==='S') boxCol(x-W,x+W,z-L,z+L);
  else boxCol(x-L,x+L,z-W,z+W);
}

// FAST COFFEE（噴水プラザ前・Road A南車線）
placeTruck(makeTruck({sideTex:textTexture('FAST COFFEE',{stripe:'#d8362f'})}), 24, 2.6, 'E');
// HOT-DOG（西のフードトラック帯）
placeTruck(makeTruck({sideTex:textTexture('HOT-DOG',{bg:'#f7d96a',fg:'#d8362f',stripe:'#d8362f',stripe2:'#f7d96a'}),
  cabColor:0xd8362f, awning:stripeTexture('#d8362f','#f7d96a')}), -62, 13, 'W');
// BBQ
placeTruck(makeTruck({sideTex:textTexture('BBQ',{bg:'#d8362f',fg:'#ffffff'}),
  cabColor:0x9e2620, cargoColor:0xd8362f}), -44, 16, 'W');
// アイスクリーム（パステル・ワークスペース脇）
placeTruck(makeTruck({cargoColor:0xf7d9e3, cabColor:0xf5f5f2,
  awning:stripeTexture('#7fe0c8','#ffffff')}), -46, -20, 'N');
// コーヒーキオスク（ワークスペース北）
placeTruck(makeTruck({cargoColor:0x8a5a33, cabColor:0x6e4628, len:3.4,
  awning:stripeTexture('#f0e2c8','#8a5a33')}), -16, -34, 'N');
// イベント搬入（オレンジ＋白バン）
placeTruck(makeTruck({cargoColor:C.orange, cabColor:C.white, len:4.8, cargoH:2.5}), 74, 88, 'N');
placeTruck(makeTruck({cargoColor:C.white, cabColor:C.white, len:3.2, cargoH:1.9}), 36, 92, 'W');

/* ============================================================
   北東＝ビル街（タワー・HOTEL・屋上テラス）
   ============================================================ */
const bandC=collector();   // タワーの窓帯
const winC=collector();    // 低層の窓
function tower(cx,cz,w,d,h,color,{rooftop=false,hotel=false}={}){
  box(w,h,d,color,cx,h/2,cz);
  box(w+0.4,0.5,d+0.4,new THREE.Color(color).multiplyScalar(0.8).getHex(),cx,h+0.25,cz);
  const floors=Math.floor((h-3)/2.6);
  for(let f=0;f<floors;f++){
    const y=2.6+f*2.6;
    bandC.add(cx,y,cz+d/2+0.04,0,(w-1.2)/10,1,1);
    bandC.add(cx,y,cz-d/2-0.04,0,(w-1.2)/10,1,1);
    bandC.add(cx+w/2+0.04,y,cz,Math.PI/2,(d-1.2)/10,1,1);
    bandC.add(cx-w/2-0.04,y,cz,Math.PI/2,(d-1.2)/10,1,1);
  }
  // 屋上設備
  box(2.2,1.1,1.6,0x9aa3a8,cx-w/4,h+0.55,cz-d/4);
  if(rooftop){
    box(w-2,0.12,d-2,C.teal,cx,h+0.56,cz,{shadow:false});
    for(let k=0;k<4;k++){
      const a=k/4*Math.PI*2;
      box(0.14,2.2,0.14,C.wood,cx+Math.cos(a)*(w/2-1.6),h+1.6,cz+Math.sin(a)*(d/2-1.6));
    }
    box(w-2.6,0.12,d-2.6,0xf0e2c8,cx,h+2.76,cz,{shadow:false});
  }
  if(hotel){
    const sign=new THREE.Mesh(new THREE.BoxGeometry(3.4,1.1,0.2),
      new THREE.MeshLambertMaterial({map:textTexture('HOTEL',{bg:'#2d3439',fg:'#f7d96a',font:'bold 110px Meiryo, sans-serif'})}));
    sign.position.set(cx,h-1.2,cz+d/2+0.15); scene.add(sign);
  }
  boxCol(cx-w/2,cx+w/2,cz-d/2,cz+d/2);
}

let bi=0;
function shop(cx,cz,w,d,h,face){
  const color=SHOP_PALETTE[bi%SHOP_PALETTE.length];
  box(w,h,d,color,cx,h/2,cz);
  box(w+0.4,0.5,d+0.4,new THREE.Color(color).multiplyScalar(0.78).getHex(),cx,h+0.25,cz);
  const horiz=(face==='+z'||face==='-z');
  const faceW=horiz?w:d;
  const cols=Math.max(1,Math.floor((faceW-1.8)/2.0));
  const rows=Math.max(1,Math.floor((h-2.6)/2.5));
  const ry=face==='+x'?Math.PI/2:face==='-x'?-Math.PI/2:face==='-z'?Math.PI:0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const u=(c-(cols-1)/2)*2.0, y=2.6+r*2.5;
    let x=cx,z=cz;
    if(face==='+z'){x=cx+u;z=cz+d/2+0.05;} if(face==='-z'){x=cx+u;z=cz-d/2-0.05;}
    if(face==='+x'){z=cz+u;x=cx+w/2+0.05;} if(face==='-x'){z=cz+u;x=cx-w/2-0.05;}
    winC.add(x,y,z,ry);
  }
  let dx=cx,dz=cz,ry2=0;
  if(face==='+z'){dz=cz+d/2+0.04;} if(face==='-z'){dz=cz-d/2-0.04;ry2=Math.PI;}
  if(face==='+x'){dx=cx+w/2+0.04;ry2=Math.PI/2;} if(face==='-x'){dx=cx-w/2-0.04;ry2=-Math.PI/2;}
  box(1.3,2.2,0.08,0x4a3a2c,dx,1.1,dz,{ry:ry2,shadow:false});
  const aw=box(Math.min(w,d)*0.6,0.12,1.3,AWNING_PALETTE[bi%AWNING_PALETTE.length],
    dx+Math.sin(ry2)*0.75,2.55,dz+Math.cos(ry2)*0.75,{ry:ry2});
  aw.rotation.x=-0.22;
  boxCol(cx-w/2,cx+w/2,cz-d/2,cz+d/2);
  bi++;
}

benchC.build(new THREE.BoxGeometry(1.9,0.5,0.55), lam(C.wood), {shadow:true});

/* ============================================================
   雲
   ============================================================ */
const clouds=[];
const cloudMat=bas(0xffffff);
for(let i=0;i<8;i++){
  const g=new THREE.Group();
  const n=3+Math.floor(Math.random()*3);
  for(let k=0;k<n;k++){
    const b=new THREE.Mesh(new THREE.BoxGeometry(8+Math.random()*10,2.4+Math.random()*1.6,5+Math.random()*5),cloudMat);
    b.position.set((Math.random()-0.5)*14,(Math.random()-0.5)*1.6,(Math.random()-0.5)*8);
    g.add(b);
  }
  g.position.set((Math.random()-0.5)*460, 64+Math.random()*34, (Math.random()-0.5)*460);
  scene.add(g); clouds.push(g);
}

/* ============================================================
   操作系：ポインターロック＋マウスドラッグ＋タッチ（左移動／右視点）＋矢印キー回転
   ============================================================ */
const overlay=document.getElementById('overlay');
const joyBase=document.getElementById('joyBase'), joyKnob=document.getElementById('joyKnob');
const player={x:0,z:46,yaw:0,pitch:-0.03};
const EYE=1.7, R=0.5;
const keys={};
let started=false, mouseDrag=false, lastMX=0, lastMY=0;
let joy=null, look=null; // タッチ

function lookDelta(dx,dy,k){
  player.yaw  -= dx*k;
  player.pitch-= dy*k;
  player.pitch=Math.max(-1.45,Math.min(1.45,player.pitch));
}
overlay.addEventListener('click',()=>{
  started=true; overlay.style.display='none';
  try{ renderer.domElement.requestPointerLock(); }catch(e){}
});
renderer.domElement.addEventListener('click',()=>{
  if(started && !('ontouchstart' in window)){
    try{ renderer.domElement.requestPointerLock(); }catch(e){}
  }
});
document.addEventListener('pointerlockchange',()=>{ /* ロック失敗してもドラッグ操作で続行 */ });
document.addEventListener('mousemove',e=>{
  if(document.pointerLockElement===renderer.domElement) lookDelta(e.movementX,e.movementY,0.0022);
  else if(mouseDrag){ lookDelta(e.clientX-lastMX,e.clientY-lastMY,0.0035); lastMX=e.clientX; lastMY=e.clientY; }
});
renderer.domElement.addEventListener('mousedown',e=>{
  if(document.pointerLockElement!==renderer.domElement){ mouseDrag=true; lastMX=e.clientX; lastMY=e.clientY; }
});
addEventListener('mouseup',()=>{ mouseDrag=false; });
addEventListener('keydown',e=>{ keys[e.code]=true; });
addEventListener('keyup',  e=>{ keys[e.code]=false; });

// タッチ
renderer.domElement.addEventListener('touchstart',e=>{
  if(!started) return;
  for(const t of e.changedTouches){
    if(t.clientX < innerWidth*0.45 && !joy){
      joy={id:t.identifier,ox:t.clientX,oy:t.clientY,vx:0,vy:0};
      joyBase.style.display='block';
      joyBase.style.left=(t.clientX-52)+'px'; joyBase.style.top=(t.clientY-52)+'px';
      joyKnob.style.display='block';
      joyKnob.style.left=(t.clientX-24)+'px'; joyKnob.style.top=(t.clientY-24)+'px';
    } else if(!look){
      look={id:t.identifier,lx:t.clientX,ly:t.clientY};
    }
  }
  e.preventDefault();
},{passive:false});
renderer.domElement.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id){
      let dx=t.clientX-joy.ox, dy=t.clientY-joy.oy;
      const d=Math.hypot(dx,dy), max=48;
      if(d>max){ dx*=max/d; dy*=max/d; }
      joy.vx=dx/max; joy.vy=dy/max;
      joyKnob.style.left=(joy.ox+dx-24)+'px'; joyKnob.style.top=(joy.oy+dy-24)+'px';
    } else if(look && t.identifier===look.id){
      lookDelta(t.clientX-look.lx, t.clientY-look.ly, 0.005);
      look.lx=t.clientX; look.ly=t.clientY;
    }
  }
  e.preventDefault();
},{passive:false});
function endTouch(e){
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id){ joy=null; joyBase.style.display='none'; joyKnob.style.display='none'; }
    if(look && t.identifier===look.id) look=null;
  }
}
renderer.domElement.addEventListener('touchend',endTouch);
renderer.domElement.addEventListener('touchcancel',endTouch);
overlay.addEventListener('touchend',()=>{ started=true; overlay.style.display='none'; },{passive:true});

function collide(){
  for(const c of colliders){
    if(c.t==='c'){
      const dx=player.x-c.x, dz=player.z-c.z, rr=c.r+R, d2=dx*dx+dz*dz;
      if(d2<rr*rr && d2>1e-8){
        const d=Math.sqrt(d2);
        player.x=c.x+dx/d*rr; player.z=c.z+dz/d*rr;
      }
    } else {
      const nx=Math.max(c.x0,Math.min(player.x,c.x1));
      const nz=Math.max(c.z0,Math.min(player.z,c.z1));
      const dx=player.x-nx, dz=player.z-nz, d2=dx*dx+dz*dz;
      if(d2<R*R){
        if(d2>1e-8){
          const d=Math.sqrt(d2);
          player.x=nx+dx/d*R; player.z=nz+dz/d*R;
        } else {
          const pl=player.x-c.x0, pr=c.x1-player.x, pt=player.z-c.z0, pb=c.z1-player.z;
          const m=Math.min(pl,pr,pt,pb);
          if(m===pl)player.x=c.x0-R; else if(m===pr)player.x=c.x1+R;
          else if(m===pt)player.z=c.z0-R; else player.z=c.z1+R;
        }
      }
    }
  }
  player.x=Math.max(-138,Math.min(138,player.x));
  player.z=Math.max(-138,Math.min(138,player.z));
}

/* ============================================================
   ミニマップ
   ============================================================ */
const mm=document.getElementById('minimap').getContext('2d');
const hex=c=>'#'+c.toString(16).padStart(6,'0');
function drawMinimap(){
  const S=152, s=S/290, cx=S/2, cz=S/2;
  mm.clearRect(0,0,S,S);
  mm.fillStyle=hex(C.pave); mm.fillRect(0,0,S,S);
  mm.fillStyle=hex(C.grass);
  mm.fillRect(cx-138*s,cz+12*s,126*s,126*s);   // 公園
  mm.fillRect(cx-132*s,cz-128*s,118*s,112*s);  // 北西の芝
  mm.fillStyle=hex(C.asphalt);
  mm.fillRect(0,cz-5*s,S,10*s); mm.fillRect(cx-5*s,0,10*s,S);
  // ビル街
  mm.fillStyle='#9ba4aa';
  mm.fillRect(cx+12*s,cz-84*s,108*s,72*s);
  // ワークスペース
  mm.fillStyle=hex(C.teal); mm.fillRect(cx-35*s,cz-28*s,22*s,16*s);
  // プラザ＋噴水
  mm.fillStyle=hex(C.plaza); mm.fillRect(cx+(PX-18)*s,cz+(PZ-18)*s,36*s,36*s);
  mm.fillStyle=hex(C.diamond);
  mm.save(); mm.translate(cx+PX*s,cz+PZ*s); mm.rotate(Math.PI/4);
  mm.fillRect(-12.6*s,-12.6*s,25.2*s,25.2*s); mm.restore();
  mm.fillStyle=hex(C.water);
  mm.beginPath(); mm.arc(cx+PX*s,cz+PZ*s,3*s,0,Math.PI*2); mm.fill();
  // イベントステージ
  mm.fillStyle=hex(C.yellow); mm.fillRect(cx+40*s,cz+80*s,24*s,13*s);
  // 菜園
  mm.fillStyle=hex(C.soil); mm.fillRect(cx-93*s,cz+57*s,15*s,24*s);
  // トラック
  mm.fillStyle=hex(C.truckRed);
  [[24,2.6],[-62,13],[-44,16]].forEach(p=>mm.fillRect(cx+p[0]*s-2,cz+p[1]*s-1.4,4,2.8));
  // プレイヤー
  const px=cx+player.x*s, pz=cz+player.z*s;
  const fx=-Math.sin(player.yaw), fz=-Math.cos(player.yaw);
  mm.save(); mm.translate(px,pz); mm.rotate(Math.atan2(fx,-fz));
  mm.fillStyle='#1f2a30';
  mm.beginPath(); mm.moveTo(0,-6); mm.lineTo(4.5,5); mm.lineTo(-4.5,5);
  mm.closePath(); mm.fill(); mm.restore();
}

/* ============================================================
   メインループ
   ============================================================ */
const clock=new THREE.Clock();
let mmTick=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;

  if(started){
    // 矢印キー：←→で回転
    if(keys.ArrowLeft)  player.yaw += 1.8*dt;
    if(keys.ArrowRight) player.yaw -= 1.8*dt;
    if(keys.KeyQ) player.yaw += 1.8*dt;
    if(keys.KeyE) player.yaw -= 1.8*dt;

    const sp=(keys.ShiftLeft||keys.ShiftRight?9:5)*dt;
    const fx=-Math.sin(player.yaw), fz=-Math.cos(player.yaw);
    const rx= Math.cos(player.yaw), rz=-Math.sin(player.yaw);
    let mx=0,mz=0;
    if(keys.KeyW||keys.ArrowUp)  {mx+=fx;mz+=fz;}
    if(keys.KeyS||keys.ArrowDown){mx-=fx;mz-=fz;}
    if(keys.KeyD){mx+=rx;mz+=rz;}
    if(keys.KeyA){mx-=rx;mz-=rz;}
    if(joy){ mx += fx*(-joy.vy)+rx*joy.vx; mz += fz*(-joy.vy)+rz*joy.vx; }
    const len=Math.hypot(mx,mz);
    if(len>0.01){
      const k=Math.min(len,1)/len;
      player.x+=mx*k*sp; player.z+=mz*k*sp; collide();
    }
  }
  camera.position.set(player.x,EYE,player.z);
  camera.rotation.set(player.pitch,player.yaw,0);

  // 噴水
  const pos=pGeo.attributes.position.array;
  let pi=0;
  for(let k=0;k<jetCurves.length;k++){
    for(let j=0;j<P_PER;j++){
      const u=(j/P_PER + t*0.55 + k*0.07)%1;
      const v=jetCurves[k].getPoint(u);
      pos[pi++]=v.x; pos[pi++]=v.y; pos[pi++]=v.z;
    }
  }
  pGeo.attributes.position.needsUpdate=true;
  waterSurf.position.y=0.91+Math.sin(t*2.2)*0.012;

  for(const c of clouds){ c.position.x+=dt*1.2; if(c.position.x>260)c.position.x=-260; }

  if(++mmTick%3===0) drawMinimap();
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
