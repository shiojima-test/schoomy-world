<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>スクーミーワールド 噴水プラザ v1.0</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#8ed1f5;font-family:Meiryo,"Hiragino Kaku Gothic ProN",sans-serif}
  #app{position:fixed;inset:0}
  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(18,42,50,.55);z-index:10;cursor:pointer}
  #overlay .panel{background:#fff;border-radius:16px;padding:30px 42px;text-align:center;
    box-shadow:0 12px 48px rgba(0,0,0,.35);max-width:80vw}
  #overlay h1{margin:0 0 10px;font-size:20px;color:#1f2a30;letter-spacing:.04em}
  #overlay h1 span{color:#3AABA8}
  #overlay p{margin:6px 0;font-size:13px;color:#44525a;line-height:1.7}
  #overlay .btn{display:inline-block;margin-top:14px;padding:10px 28px;border-radius:999px;
    background:#3AABA8;color:#fff;font-size:14px;letter-spacing:.06em}
  #minimap{position:fixed;right:14px;bottom:14px;width:152px;height:152px;border-radius:12px;
    border:2px solid rgba(255,255,255,.85);background:rgba(186,196,201,.92);z-index:5;
    box-shadow:0 4px 16px rgba(0,0,0,.25)}
  #ver{position:fixed;left:10px;bottom:8px;color:rgba(255,255,255,.78);font-size:11px;z-index:5;
    text-shadow:0 1px 3px rgba(0,0,0,.45);user-select:none}
</style>
</head>
<body>
<div id="app"></div>
<canvas id="minimap" width="152" height="152"></canvas>
<div id="ver">SchooMy World v1.0</div>
<div id="overlay">
  <div class="panel">
    <h1><span>スクーミーワールド</span>　噴水プラザ</h1>
    <p>W A S D：移動　／　マウス：視点　／　Shift：ダッシュ</p>
    <p>クリックでスタート（Escで一時停止）</p>
    <div class="btn">START</div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   SchooMy World — Fountain Plaza  v1.0
   単一HTML / Three.js (CDN) / 一人称ウォークスルー
   ============================================================ */

const COLOR = {
  sky:      0x8ed1f5,
  pave:     0xb9bdbf,   // 周辺の舗装
  plaza:    0xc9cccf,   // プラザ基盤（明るい灰の石畳）
  diamond:  0xd6d9db,   // ひし形の石畳
  border:   0x8e9496,   // ひし形の濃い縁取り
  asphalt:  0x565b5f,
  dash:     0xf2f4f4,
  stone:    0xcfd4d7,   // 噴水の石
  basin:    0x1b5e66,   // ダークティールの水盤
  water:    0x3fe6de,   // 光るターコイズの水面
  jet:      0x6ff0ea,   // 噴き上がる水
  topiary:  0x46c25a,   // 球形トピアリー
  shrub:    0x7fe08c,   // ミントグリーンの低木
  grass:    0x69c95e,
  palmTrunk:0x9a7b4f,
  palmLeaf: 0x2fae52,
  truckRed: 0xd8362f,
  truckWhite:0xf5f5f2,
  lampPole: 0x3c4448,
  glass:    0x9ad2ea
};
const BUILDING_PALETTE = [0xf5d9a8,0xe8a87c,0xa8d8ea,0xf7f3e9,0xd98e73,0xbfd8b8,0xead7c3,0x9cc4d8];
const AWNING_PALETTE   = [0xd8362f,0x3aaba8,0xe88a0a,0x2e8ec4];

/* ---------- renderer / scene / camera ---------- */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(COLOR.sky);
scene.fog = new THREE.Fog(COLOR.sky, 90, 330);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 600);
camera.rotation.order = 'YXZ';

/* ---------- lights ---------- */
scene.add(new THREE.HemisphereLight(0xcdeaff, 0x9cc28b, 0.95));
const sun = new THREE.DirectionalLight(0xfff3df, 1.25);
sun.position.set(60, 90, 45);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
sun.shadow.camera.top  =  80; sun.shadow.camera.bottom = -80;
sun.shadow.camera.near = 10;  sun.shadow.camera.far = 260;
sun.shadow.bias = -0.0006;
sun.shadow.radius = 4;
scene.add(sun);

/* ---------- helpers ---------- */
const lam = c => new THREE.MeshLambertMaterial({ color:c });
const colliders = []; // {t:'c',x,z,r} / {t:'b',x0,x1,z0,z1}
const dummy = new THREE.Object3D();
function setI(mesh, i, x, y, z, ry=0, sx=1, sy=1, sz=1){
  dummy.position.set(x,y,z); dummy.rotation.set(0,ry,0); dummy.scale.set(sx,sy,sz);
  dummy.updateMatrix(); mesh.setMatrixAt(i, dummy.matrix);
}

/* ============================================================
   地面・プラザ・道路
   ============================================================ */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(700, 700), lam(COLOR.pave));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
scene.add(ground);

// プラザ基盤（36×36 の明るい石畳ブロック）
const plazaBase = new THREE.Mesh(new THREE.BoxGeometry(36, 0.1, 36), lam(COLOR.plaza));
plazaBase.position.y = 0.05; plazaBase.receiveShadow = true;
scene.add(plazaBase);

// ひし形（45°回転の正方形）＋濃い縁取り
const borderSq = new THREE.Mesh(new THREE.BoxGeometry(26.4, 0.06, 26.4), lam(COLOR.border));
borderSq.position.y = 0.13; borderSq.rotation.y = Math.PI/4; borderSq.receiveShadow = true;
scene.add(borderSq);
const diamondSq = new THREE.Mesh(new THREE.BoxGeometry(25.2, 0.06, 25.2), lam(COLOR.diamond));
diamondSq.position.y = 0.17; diamondSq.rotation.y = Math.PI/4; diamondSq.receiveShadow = true;
scene.add(diamondSq);

/* ---- 道路：大通り（z方向・x=-23）と交差道路（x方向・z=-23） ---- */
function road(w, l, x, z, ry){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.04, l), lam(COLOR.asphalt));
  m.position.set(x, 0.02, z); m.rotation.y = ry; m.receiveShadow = true;
  scene.add(m);
}
road(10, 290, -23, -77, 0);        // 大通り：z=+68 〜 -222
road(10, 210,  -8, -23, Math.PI/2); // 交差道路：x=-113 〜 +97

// 白いダッシュの中央線（Instanced）
const dashGeo = new THREE.BoxGeometry(0.28, 0.02, 2.2);
const dashes = [];
for(let z = 62; z > -218; z -= 5) dashes.push([-23, z, 0]);
for(let x = -110; x < 95; x += 5){
  if(Math.abs(x + 23) < 7) continue; // 交差点内はスキップ
  dashes.push([x, -23, Math.PI/2]);
}
const dashMesh = new THREE.InstancedMesh(dashGeo, lam(COLOR.dash), dashes.length);
dashes.forEach((d,i)=> setI(dashMesh, i, d[0], 0.05, d[1], d[2]));
scene.add(dashMesh);

// 横断歩道（大通り上・プラザ北側）
const zebraMesh = new THREE.InstancedMesh(
  new THREE.BoxGeometry(9.4, 0.02, 0.62), lam(COLOR.dash), 6);
for(let i = 0; i < 6; i++) setI(zebraMesh, i, -23, 0.05, -12.6 - i*1.24);
scene.add(zebraMesh);

// 歩道（道路と建物の間の明るい帯）
function sidewalk(w, l, x, z){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.08, l), lam(0xc4c8ca));
  m.position.set(x, 0.04, z); m.receiveShadow = true; scene.add(m);
}
sidewalk(3, 290, -30.5, -77);
sidewalk(3, 252, -15.5, -96);
sidewalk(210, 3, -8, -30.5);

/* ============================================================
   噴水（画像Aの再現）
   ============================================================ */
const fountain = new THREE.Group();

// 四角いダークティールの水盤
const basin = new THREE.Mesh(new THREE.BoxGeometry(8, 0.9, 8), lam(COLOR.basin));
basin.position.y = 0.45; basin.castShadow = true; basin.receiveShadow = true;
fountain.add(basin);

// 光るターコイズの水面
const waterSurf = new THREE.Mesh(
  new THREE.PlaneGeometry(7.3, 7.3),
  new THREE.MeshBasicMaterial({ color:COLOR.water, transparent:true, opacity:0.95 }));
waterSurf.rotation.x = -Math.PI/2; waterSurf.position.y = 0.91;
fountain.add(waterSurf);

// 段状の石の円柱（半径を減らしながら積層）
const tiers = [
  { r:2.7, h:0.55, y:0.90 },
  { r:2.0, h:0.85, y:1.45 },
  { r:1.3, h:0.85, y:2.30 },
  { r:0.65,h:0.85, y:3.15 }
];
tiers.forEach(t=>{
  const c = new THREE.Mesh(new THREE.CylinderGeometry(t.r, t.r*1.06, t.h, 20), lam(COLOR.stone));
  c.position.y = t.y + t.h/2; c.castShadow = true; c.receiveShadow = true;
  fountain.add(c);
});
const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.32, 0.4, 12), lam(COLOR.stone));
cap.position.y = 4.18; cap.castShadow = true;
fountain.add(cap);

// 各段の縁に水のリング
[ {r:2.45,y:1.48},{r:1.78,y:2.33},{r:1.12,y:3.18} ].forEach(o=>{
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(o.r, 0.07, 8, 28),
    new THREE.MeshBasicMaterial({ color:COLOR.water, transparent:true, opacity:0.85 }));
  ring.rotation.x = Math.PI/2; ring.position.y = o.y;
  fountain.add(ring);
});

// 左右対称に弧を描く噴流（チューブ＋粒子）
const jetCurves = [];
const jetMat = new THREE.MeshBasicMaterial({ color:COLOR.jet, transparent:true, opacity:0.8 });
for(let k = 0; k < 8; k++){
  const a = k/8 * Math.PI*2;
  const c = Math.cos(a), s = Math.sin(a);
  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(0.30*c, 4.20, 0.30*s),
    new THREE.Vector3(1.90*c, 4.95, 1.90*s),
    new THREE.Vector3(3.25*c, 0.95, 3.25*s));
  jetCurves.push(curve);
  const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 18, 0.075, 6, false), jetMat);
  fountain.add(tube);
}
// 粒子（噴流に沿って流れる）
const P_PER = 12, P_N = jetCurves.length * P_PER;
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(P_N*3), 3));
const pMat = new THREE.PointsMaterial({ color:0xc8fffb, size:0.16, transparent:true, opacity:0.95 });
const particles = new THREE.Points(pGeo, pMat);
fountain.add(particles);

scene.add(fountain);
colliders.push({ t:'c', x:0, z:0, r:5.3 });

/* ---- 噴水まわり：球形トピアリーを等間隔に ---- */
const TOPI_N = 8;
const topiTrunk = new THREE.InstancedMesh(
  new THREE.CylinderGeometry(0.10, 0.13, 0.7, 8), lam(COLOR.palmTrunk), TOPI_N);
const topiBall = new THREE.InstancedMesh(
  new THREE.IcosahedronGeometry(0.85, 1), lam(COLOR.topiary), TOPI_N);
topiBall.castShadow = true;
const topiPot = new THREE.InstancedMesh(
  new THREE.CylinderGeometry(0.32, 0.38, 0.35, 10), lam(0xb9bdbf), TOPI_N);
for(let k = 0; k < TOPI_N; k++){
  const a = (k + 0.5)/TOPI_N * Math.PI*2;
  const x = Math.cos(a)*6.9, z = Math.sin(a)*6.9;
  setI(topiTrunk, k, x, 0.55, z);
  setI(topiBall,  k, x, 1.55, z);
  setI(topiPot,   k, x, 0.30, z);
  colliders.push({ t:'c', x, z, r:0.95 });
}
scene.add(topiTrunk, topiBall, topiPot);

/* ---- 四隅：芝生＋低木の植え込みベッド ---- */
const beds = [[13,13],[-13,13],[13,-13],[-13,-13]];
const shrubMesh = new THREE.InstancedMesh(
  new THREE.IcosahedronGeometry(0.62, 1), lam(COLOR.shrub), beds.length*5);
shrubMesh.castShadow = true;
let si = 0;
beds.forEach(([bx,bz])=>{
  const rim = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.34, 5.4), lam(COLOR.border));
  rim.position.set(bx, 0.27, bz); rim.castShadow = true; rim.receiveShadow = true;
  scene.add(rim);
  const grass = new THREE.Mesh(new THREE.BoxGeometry(4.9, 0.1, 4.9), lam(COLOR.grass));
  grass.position.set(bx, 0.47, bz); grass.receiveShadow = true;
  scene.add(grass);
  const spots = [[0,0],[1.4,1.2],[-1.4,1.1],[1.2,-1.4],[-1.3,-1.2]];
  spots.forEach(([dx,dz])=>{
    setI(shrubMesh, si++, bx+dx, 0.85, bz+dz, Math.random()*3, 1, 0.82, 1);
  });
  colliders.push({ t:'b', x0:bx-2.7, x1:bx+2.7, z0:bz-2.7, z1:bz+2.7 });
});
scene.add(shrubMesh);

/* ============================================================
   FAST COFFEE トラック（赤×白の配送トラック）
   ============================================================ */
function truckSideTexture(){
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 256;
  const g = cv.getContext('2d');
  g.fillStyle = '#f5f5f2'; g.fillRect(0, 0, 512, 256);
  // 上部：赤白ストライプのオーニング帯
  for(let x = 0; x < 512; x += 64){
    g.fillStyle = '#d8362f'; g.fillRect(x, 0, 32, 56);
  }
  g.fillStyle = '#d8362f';
  g.font = 'bold 64px Meiryo, sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('FAST COFFEE', 256, 150);
  g.fillStyle = '#1f2a30'; g.fillRect(0, 244, 512, 12);
  const tx = new THREE.CanvasTexture(cv);
  tx.colorSpace = THREE.SRGBColorSpace;
  return tx;
}
const truck = new THREE.Group();
{
  const sideTex = truckSideTexture();
  const sideMat = new THREE.MeshLambertMaterial({ map: sideTex });
  const whiteMat = lam(COLOR.truckWhite);
  // 荷台（±x面にテクスチャ）
  const cargo = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 2.2, 4.2),
    [sideMat, sideMat, whiteMat, whiteMat, whiteMat, whiteMat]);
  cargo.position.set(0, 1.85, 0.9); cargo.castShadow = true;
  truck.add(cargo);
  // キャビン（赤）
  const cab = new THREE.Mesh(new THREE.BoxGeometry(2.1, 1.45, 1.7), lam(COLOR.truckRed));
  cab.position.set(0, 1.32, -2.15); cab.castShadow = true;
  truck.add(cab);
  const winShield = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.62, 0.1), lam(0x6fb6d8));
  winShield.position.set(0, 1.62, -3.0);
  truck.add(winShield);
  const bumper = new THREE.Mesh(new THREE.BoxGeometry(2.15, 0.3, 0.25), lam(0xd9dcde));
  bumper.position.set(0, 0.62, -3.06);
  truck.add(bumper);
  // 車輪
  const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.34, 14);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelPos = [[-1.05,-2.2],[1.05,-2.2],[-1.05,1.7],[1.05,1.7]];
  wheelPos.forEach(([wx,wz])=>{
    const w = new THREE.Mesh(wheelGeo, lam(0x23282b));
    w.position.set(wx, 0.45, wz); w.castShadow = true;
    truck.add(w);
  });
}
truck.position.set(-19.4, 0, 4);   // 大通り東端に停車
scene.add(truck);
colliders.push({ t:'b', x0:-20.7, x1:-18.1, z0:0.7, z1:7.3 });

/* ============================================================
   ヤシの木（Instanced：幹＋葉）
   ============================================================ */
const palmPos = [
  [16.2, 16.2],[-16.2, 16.2],[16.2,-16.2],[-16.2,-16.2],
  [-27.5, 26],[-27.5, 50],[-18.5,-46],[-27.5,-70],[-18.5,-96],[-27.5,-122],
  [28, -34],[52, -27.8],[-58, -27.8]
];
const PALM_N = palmPos.length, FROND_N = 7;
const palmTrunkMesh = new THREE.InstancedMesh(
  new THREE.CylinderGeometry(0.16, 0.30, 7.5, 7), lam(COLOR.palmTrunk), PALM_N);
palmTrunkMesh.castShadow = true;
const frondGeo = new THREE.ConeGeometry(0.55, 3.4, 4);
frondGeo.translate(0, 1.7, 0);
frondGeo.rotateX(Math.PI/2 + 0.55);   // 先端をやや下げて外向きに
const frondMesh = new THREE.InstancedMesh(frondGeo, lam(COLOR.palmLeaf), PALM_N*FROND_N);
frondMesh.castShadow = true;
let fi = 0;
palmPos.forEach((p, i)=>{
  setI(palmTrunkMesh, i, p[0], 3.75, p[1]);
  for(let k = 0; k < FROND_N; k++){
    const ry = k/FROND_N * Math.PI*2 + i*0.7;
    setI(frondMesh, fi++, p[0], 7.45, p[1], ry);
  }
  colliders.push({ t:'c', x:p[0], z:p[1], r:0.55 });
});
scene.add(palmTrunkMesh, frondMesh);

/* ============================================================
   街灯（Instanced）
   ============================================================ */
const lampPos = [];
for(let z = 50; z > -210; z -= 22){ lampPos.push([-31.6, z]); lampPos.push([-14.4, z]); }
for(let x = -100; x < 95; x += 24){
  if(Math.abs(x + 23) < 9) continue;
  lampPos.push([x, -31.6]);
}
[[10,19.5],[-10,19.5],[19.5,10],[19.5,-10]].forEach(p=>lampPos.push(p));
const LAMP_N = lampPos.length;
const lampPole = new THREE.InstancedMesh(
  new THREE.CylinderGeometry(0.08, 0.11, 4.6, 7), lam(COLOR.lampPole), LAMP_N);
lampPole.castShadow = true;
const lampHead = new THREE.InstancedMesh(
  new THREE.SphereGeometry(0.26, 10, 8),
  new THREE.MeshBasicMaterial({ color:0xfff0c0 }), LAMP_N);
lampPos.forEach((p, i)=>{
  setI(lampPole, i, p[0], 2.3, p[1]);
  setI(lampHead, i, p[0], 4.75, p[1]);
  colliders.push({ t:'c', x:p[0], z:p[1], r:0.32 });
});
scene.add(lampPole, lampHead);

/* ============================================================
   街並み（ローポリ建物：大通りが消失点へ伸びる）
   ============================================================ */
const winMatrices = [];
function pushWindows(cx, cz, w, d, h, face){
  const horiz = (face === '+z' || face === '-z');
  const faceW = horiz ? w : d;
  const cols = Math.max(1, Math.floor((faceW - 1.8) / 2.0));
  const rows = Math.max(1, Math.floor((h - 2.6) / 2.5));
  const ry = face === '+x' ? Math.PI/2 : face === '-x' ? -Math.PI/2 :
             face === '-z' ? Math.PI : 0;
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      const u = (c - (cols-1)/2) * 2.0;
      const y = 2.6 + r * 2.5;
      let x = cx, z = cz;
      if(face === '+z'){ x = cx + u; z = cz + d/2 + 0.05; }
      if(face === '-z'){ x = cx + u; z = cz - d/2 - 0.05; }
      if(face === '+x'){ z = cz + u; x = cx + w/2 + 0.05; }
      if(face === '-x'){ z = cz + u; x = cx - w/2 - 0.05; }
      dummy.position.set(x, y, z); dummy.rotation.set(0, ry, 0); dummy.scale.set(1,1,1);
      dummy.updateMatrix();
      winMatrices.push(dummy.matrix.clone());
    }
  }
}
let bi = 0;
function addBuilding(cx, cz, w, d, h, face, withAwning){
  const color = BUILDING_PALETTE[bi % BUILDING_PALETTE.length];
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), lam(color));
  body.position.set(cx, h/2, cz); body.castShadow = true; body.receiveShadow = true;
  scene.add(body);
  // パラペット（屋上の縁）
  const top = new THREE.Mesh(new THREE.BoxGeometry(w+0.4, 0.5, d+0.4),
    lam(new THREE.Color(color).multiplyScalar(0.78).getHex()));
  top.position.set(cx, h+0.25, cz); top.castShadow = true;
  scene.add(top);
  pushWindows(cx, cz, w, d, h, face);
  // 入口ドア＋オーニング
  let dx = cx, dz = cz, ry = 0;
  if(face === '+z'){ dz = cz + d/2 + 0.04; }
  if(face === '-z'){ dz = cz - d/2 - 0.04; ry = Math.PI; }
  if(face === '+x'){ dx = cx + w/2 + 0.04; ry = Math.PI/2; }
  if(face === '-x'){ dx = cx - w/2 - 0.04; ry = -Math.PI/2; }
  const door = new THREE.Mesh(new THREE.BoxGeometry(1.3, 2.2, 0.08), lam(0x4a3a2c));
  door.position.set(dx, 1.1, dz); door.rotation.y = ry;
  scene.add(door);
  if(withAwning){
    const aw = new THREE.Mesh(new THREE.BoxGeometry(Math.min(w,d)*0.6, 0.12, 1.3),
      lam(AWNING_PALETTE[bi % AWNING_PALETTE.length]));
    aw.rotation.y = ry; aw.rotation.x = -0.22;
    const off = 0.75;
    aw.position.set(
      dx + Math.sin(ry)*off, 2.55, dz + Math.cos(ry)*off);
    aw.castShadow = true;
    scene.add(aw);
  }
  colliders.push({ t:'b', x0:cx-w/2, x1:cx+w/2, z0:cz-d/2, z1:cz+d/2 });
  bi++;
}

// 大通り西側（消失点へ向かって連なる）
for(let z = 44; z > -200; ){
  const w = 10 + Math.floor(Math.random()*3)*2;     // 10/12/14
  const d = 9  + Math.floor(Math.random()*2)*3;     // 9/12
  const h = 7  + Math.floor(Math.random()*5)*2.4;   // 7〜16.6
  addBuilding(-32 - d/2, z - w/2, d, w, h, '+x', Math.random() < 0.5);
  z -= w + 2.5;
}
// 大通り東側（プラザの範囲 z∈[-20,20] は空ける）
for(let z = 44; z > -200; ){
  const w = 10 + Math.floor(Math.random()*3)*2;
  const d = 9  + Math.floor(Math.random()*2)*3;
  const h = 7  + Math.floor(Math.random()*4)*2.4;
  const z0 = z - w/2;
  if(z0 + w/2 < -25 || z0 - w/2 > 23){
    addBuilding(-14 + d/2, z0, d, w, h, '-x', Math.random() < 0.5);
  }
  z -= w + 2.5;
}
// 交差道路の北側
for(let x = -8; x < 95; ){
  const w = 11 + Math.floor(Math.random()*3)*2;
  const h = 7  + Math.floor(Math.random()*4)*2.4;
  addBuilding(x + w/2, -38, w, 11, h, '-z', Math.random() < 0.5);
  x += w + 2.5;
}
// プラザ東側と南側（広場を囲む低層の店）
addBuilding(27,   6, 10, 9, 7.5, '-x', true);
addBuilding(27,  -7, 10, 9, 9.9, '-x', true);
addBuilding(  6, 27,  10, 9, 7.5, '-z', true);
addBuilding( -7, 27,  10, 9, 9.9, '-z', true);
addBuilding( 40, 27,  14, 11, 12.3, '-z', false);
addBuilding( 58, 27,  14, 11, 9.9,  '-z', false);

// 窓（全建物分を一括 Instanced）
const winMesh = new THREE.InstancedMesh(
  new THREE.BoxGeometry(1.15, 1.35, 0.08), lam(COLOR.glass), winMatrices.length);
winMatrices.forEach((m, i)=> winMesh.setMatrixAt(i, m));
scene.add(winMesh);

/* ============================================================
   雲（ローポリ・ゆっくり流れる）
   ============================================================ */
const clouds = [];
const cloudMat = new THREE.MeshBasicMaterial({ color:0xffffff });
for(let i = 0; i < 7; i++){
  const g = new THREE.Group();
  const n = 3 + Math.floor(Math.random()*3);
  for(let k = 0; k < n; k++){
    const b = new THREE.Mesh(
      new THREE.BoxGeometry(8+Math.random()*10, 2.4+Math.random()*1.6, 5+Math.random()*5),
      cloudMat);
    b.position.set((Math.random()-0.5)*14, (Math.random()-0.5)*1.6, (Math.random()-0.5)*8);
    g.add(b);
  }
  g.position.set((Math.random()-0.5)*420, 62+Math.random()*32, -40-Math.random()*260);
  scene.add(g);
  clouds.push(g);
}

/* ============================================================
   操作（ポインターロック＋WASD）
   ============================================================ */
const overlay = document.getElementById('overlay');
const player = { x:0, z:26, yaw:0, pitch:-0.04 };
const EYE = 1.7, R = 0.5;
const keys = {};

overlay.addEventListener('click', ()=> renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', ()=>{
  overlay.style.display = (document.pointerLockElement === renderer.domElement) ? 'none' : 'flex';
});
document.addEventListener('mousemove', e=>{
  if(document.pointerLockElement !== renderer.domElement) return;
  player.yaw   -= e.movementX * 0.0022;
  player.pitch -= e.movementY * 0.0022;
  player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch));
});
addEventListener('keydown', e=>{ keys[e.code] = true; });
addEventListener('keyup',   e=>{ keys[e.code] = false; });

function collide(){
  for(const c of colliders){
    if(c.t === 'c'){
      const dx = player.x - c.x, dz = player.z - c.z;
      const rr = c.r + R, d2 = dx*dx + dz*dz;
      if(d2 < rr*rr && d2 > 1e-8){
        const d = Math.sqrt(d2);
        player.x = c.x + dx/d*rr; player.z = c.z + dz/d*rr;
      }
    } else {
      const nx = Math.max(c.x0, Math.min(player.x, c.x1));
      const nz = Math.max(c.z0, Math.min(player.z, c.z1));
      const dx = player.x - nx, dz = player.z - nz;
      const d2 = dx*dx + dz*dz;
      if(d2 < R*R){
        if(d2 > 1e-8){
          const d = Math.sqrt(d2);
          player.x = nx + dx/d*R; player.z = nz + dz/d*R;
        } else {
          const pl = player.x - c.x0, pr = c.x1 - player.x;
          const pt = player.z - c.z0, pb = c.z1 - player.z;
          const m = Math.min(pl, pr, pt, pb);
          if(m === pl) player.x = c.x0 - R;
          else if(m === pr) player.x = c.x1 + R;
          else if(m === pt) player.z = c.z0 - R;
          else player.z = c.z1 + R;
        }
      }
    }
  }
  player.x = Math.max(-95, Math.min(95, player.x));
  player.z = Math.max(-205, Math.min(55, player.z));
}

/* ============================================================
   ミニマップ
   ============================================================ */
const mm = document.getElementById('minimap').getContext('2d');
function hex(c){ return '#' + c.toString(16).padStart(6, '0'); }
function drawMinimap(){
  const S = 152, s = S/150, cx = S/2, cz = S/2 - 14; // 1px ≒ 1m、やや北寄せ
  mm.clearRect(0, 0, S, S);
  mm.fillStyle = hex(COLOR.pave); mm.fillRect(0, 0, S, S);
  // 道路
  mm.fillStyle = hex(COLOR.asphalt);
  mm.fillRect(cx + (-28)*s, 0, 10*s, S);
  mm.fillRect(0, cz + (-28)*s, S, 10*s);
  // プラザ＋ひし形
  mm.fillStyle = hex(COLOR.plaza);
  mm.fillRect(cx - 18*s, cz - 18*s, 36*s, 36*s);
  mm.fillStyle = hex(COLOR.diamond);
  mm.save(); mm.translate(cx, cz); mm.rotate(Math.PI/4);
  mm.fillRect(-12.6*s, -12.6*s, 25.2*s, 25.2*s); mm.restore();
  // 噴水
  mm.fillStyle = hex(COLOR.basin); mm.fillRect(cx - 4*s, cz - 4*s, 8*s, 8*s);
  mm.fillStyle = hex(COLOR.water);
  mm.beginPath(); mm.arc(cx, cz, 2.6*s, 0, Math.PI*2); mm.fill();
  // トラック
  mm.fillStyle = hex(COLOR.truckRed);
  mm.fillRect(cx + (-20.7)*s, cz + 0.7*s, 2.6*s, 6.6*s);
  // プレイヤー
  const px = cx + player.x*s, pz = cz + player.z*s;
  const fx = -Math.sin(player.yaw), fz = -Math.cos(player.yaw);
  mm.save(); mm.translate(px, pz); mm.rotate(Math.atan2(fx, -fz));
  mm.fillStyle = '#1f2a30';
  mm.beginPath(); mm.moveTo(0, -6); mm.lineTo(4.5, 5); mm.lineTo(-4.5, 5);
  mm.closePath(); mm.fill();
  mm.restore();
}

/* ============================================================
   ループ
   ============================================================ */
const clock = new THREE.Clock();
let mmTick = 0;
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 移動
  if(document.pointerLockElement === renderer.domElement){
    const sp = (keys.ShiftLeft || keys.ShiftRight ? 9 : 5) * dt;
    const fx = -Math.sin(player.yaw), fz = -Math.cos(player.yaw);
    const rx =  Math.cos(player.yaw), rz = -Math.sin(player.yaw);
    let mx = 0, mz = 0;
    if(keys.KeyW || keys.ArrowUp)    { mx += fx; mz += fz; }
    if(keys.KeyS || keys.ArrowDown)  { mx -= fx; mz -= fz; }
    if(keys.KeyD || keys.ArrowRight) { mx += rx; mz += rz; }
    if(keys.KeyA || keys.ArrowLeft)  { mx -= rx; mz -= rz; }
    const len = Math.hypot(mx, mz);
    if(len > 0){ player.x += mx/len*sp; player.z += mz/len*sp; collide(); }
  }
  camera.position.set(player.x, EYE, player.z);
  camera.rotation.set(player.pitch, player.yaw, 0);

  // 噴水アニメーション
  const pos = pGeo.attributes.position.array;
  let pi = 0;
  for(let k = 0; k < jetCurves.length; k++){
    for(let j = 0; j < P_PER; j++){
      const u = (j/P_PER + t*0.55 + k*0.07) % 1;
      const v = jetCurves[k].getPoint(u);
      pos[pi++] = v.x; pos[pi++] = v.y; pos[pi++] = v.z;
    }
  }
  pGeo.attributes.position.needsUpdate = true;
  waterSurf.position.y = 0.91 + Math.sin(t*2.2)*0.012;

  // 雲のドリフト
  for(const c of clouds){
    c.position.x += dt * 1.2;
    if(c.position.x > 240) c.position.x = -240;
  }

  if(++mmTick % 3 === 0) drawMinimap();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
