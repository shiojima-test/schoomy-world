<script type="module">
import * as THREE from 'three';

/* ============================================================
   SchooMy World v4.0 — RPGタウン（FF/DQ風）
   石畳の街路に木組みの家135軒が密集／城壁と4つの門／
   北の丘に城／教会・宿屋・風車・井戸・クエスト掲示板／
   吊り看板・樽・木箱・荷車・横断バナー
   ＋スクーミーの噴水プラザ・フードトラック・ワークスペース・
     カフェテラス・イベントステージ・公園はそのまま
   ============================================================ */

const C={
  sky:0x8ed1f5, grass:0x7ecb5a,
  plaza:0xc9cccf, diamond:0xd6d9db, border:0x8e9496,
  stone:0xcfd4d7, basin:0x1b5e66, water:0x3fe6de, jet:0x6ff0ea,
  topiary:0x46c25a, shrub:0x7fe08c,
  palmTrunk:0x9a7b4f, palmLeaf:0x2fae52, treeTrunk:0x7a5a38,
  truckRed:0xd8362f, white:0xf5f5f2, orange:0xe88a0a,
  lamp:0x2b3136, glass:0x9ad2ea, teal:0x3aaba8, tealD:0x2a8a88,
  wood:0x8a5a33, woodL:0xb07a45, woodD:0x5e3d22,
  pinkFence:0xf2a7c3, soil:0x6e4a2e,
  stage:0x2d3439, yellow:0xf0c54a, pond:0x57c9e8,
  wallStone:0xb7b3a8, wallStoneD:0x9d998e
};
const TREE_GREENS=[0x3fae4f,0x55c25e,0x2f9a47,0x6fcf6a];
const WALLS=[0xf7f3ea,0xf2e8d8,0xf0cfae,0xf2e2b0,0xcfe0ea,0xd8e8cf,0xeadfc8];
const ROOFS=[0xc0573a,0xa84030,0x3a6ea8,0x4a7d4f,0x5a6470,0xb55a2a];
const PEN_COLORS=[0xd8362f,0xf0c54a,0x3aaba8,0x2e8ec4,0xe88a0a,0xe586b4];
const FLOWER_COLORS=[0xe04438,0xf0c54a,0xf28ab4,0xffffff,0x8a6fd0,0xe88a0a];

/* ---------- renderer / scene ---------- */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(C.sky);
scene.fog=new THREE.Fog(C.sky,110,430);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,800);
camera.rotation.order='YXZ';

scene.add(new THREE.HemisphereLight(0xcdeaff,0x9cc28b,0.95));
const sun=new THREE.DirectionalLight(0xfff3df,1.25);
sun.position.set(80,110,60);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-145; sun.shadow.camera.right=145;
sun.shadow.camera.top=145; sun.shadow.camera.bottom=-145;
sun.shadow.camera.near=10; sun.shadow.camera.far=400;
sun.shadow.bias=-0.0008; sun.shadow.radius=4;
scene.add(sun);

/* ---------- helpers ---------- */
const lam=c=>new THREE.MeshLambertMaterial({color:c});
const bas=c=>new THREE.MeshBasicMaterial({color:c});
const colliders=[];
const circleCol=(x,z,r)=>colliders.push({t:'c',x,z,r});
const boxCol=(x0,x1,z0,z1)=>colliders.push({t:'b',x0,x1,z0,z1});
const dummy=new THREE.Object3D();
const rot2=(dx,dz,ry)=>[Math.cos(ry)*dx+Math.sin(ry)*dz,-Math.sin(ry)*dx+Math.cos(ry)*dz];
function loc(cx,cz,f,lx,lz){
  const s=Math.sin(f),c=Math.cos(f);
  return [cx+c*lx+s*lz, cz-s*lx+c*lz];
}
function collector(){
  return {
    mats:[],cols:[],
    add(x,y,z,ry=0,sx=1,sy=1,sz=1,color=null){
      dummy.position.set(x,y,z); dummy.rotation.set(0,ry,0); dummy.scale.set(sx,sy,sz);
      dummy.updateMatrix(); this.mats.push(dummy.matrix.clone()); this.cols.push(color);
    },
    build(geo,mat,{shadow=false,parent=scene}={}){
      const n=this.mats.length; if(!n) return null;
      const m=new THREE.InstancedMesh(geo,mat,n);
      this.mats.forEach((mx,i)=>{
        m.setMatrixAt(i,mx);
        if(this.cols[i]!==null&&this.cols[i]!==undefined) m.setColorAt(i,new THREE.Color(this.cols[i]));
      });
      if(shadow)m.castShadow=true;
      m.receiveShadow=true; parent.add(m); return m;
    }
  };
}
function box(w,h,d,c,x,y,z,{ry=0,shadow=true,recv=true,parent=scene,mat=null}={}){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat||lam(c));
  m.position.set(x,y,z); m.rotation.y=ry;
  m.castShadow=shadow; m.receiveShadow=recv; parent.add(m); return m;
}

/* ---------- テクスチャ工房 ---------- */
function cobbleTex(palette,joint,size=256,cell=30){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const g=cv.getContext('2d');
  g.fillStyle=joint; g.fillRect(0,0,size,size);
  for(let y=0;y<size;y+=cell){
    const off=(y/cell)%2?cell/2:0;
    for(let x=-cell;x<size+cell;x+=cell){
      g.fillStyle=palette[Math.floor(Math.random()*palette.length)];
      const jx=x+off+2+Math.random()*2, jy=y+2+Math.random()*2;
      const w=cell-5-Math.random()*3, h=cell-5-Math.random()*3;
      g.beginPath();
      if(g.roundRect) g.roundRect(jx,jy,w,h,7); else g.rect(jx,jy,w,h);
      g.fill();
    }
  }
  const t=new THREE.CanvasTexture(cv);
  t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function noiseTex(base,spots,size=256){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const g=cv.getContext('2d');
  g.fillStyle=base; g.fillRect(0,0,size,size);
  spots.forEach(([col,n,rmin,rmax])=>{
    g.fillStyle=col;
    for(let i=0;i<n;i++){
      const r=rmin+Math.random()*(rmax-rmin);
      g.beginPath(); g.arc(Math.random()*size,Math.random()*size,r,0,Math.PI*2); g.fill();
    }
  });
  const t=new THREE.CanvasTexture(cv);
  t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function tileTex(base,line,cell=64,size=256){
  const cv=document.createElement('canvas'); cv.width=cv.height=size;
  const g=cv.getContext('2d');
  g.fillStyle=base; g.fillRect(0,0,size,size);
  g.strokeStyle=line; g.lineWidth=3;
  for(let p=0;p<=size;p+=cell){
    g.beginPath();g.moveTo(p,0);g.lineTo(p,size);g.stroke();
    g.beginPath();g.moveTo(0,p);g.lineTo(size,p);g.stroke();
  }
  const t=new THREE.CanvasTexture(cv);
  t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
function textTexture(text,{bg='#f5f5f2',fg='#d8362f',stripe=null,font='bold 64px Meiryo, sans-serif'}={}){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=256;
  const g=cv.getContext('2d');
  g.fillStyle=bg; g.fillRect(0,0,512,256);
  if(stripe){ for(let x=0;x<512;x+=64){ g.fillStyle=stripe; g.fillRect(x,0,32,56);} }
  g.fillStyle=fg; g.font=font; g.textAlign='center'; g.textBaseline='middle';
  g.fillText(text,256,stripe?150:128);
  const tx=new THREE.CanvasTexture(cv); tx.colorSpace=THREE.SRGBColorSpace; return tx;
}
function stripeTexture(c1,c2){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64;
  const g=cv.getContext('2d');
  g.fillStyle=c2; g.fillRect(0,0,256,64);
  for(let x=0;x<256;x+=32){ g.fillStyle=c1; g.fillRect(x,0,16,64); }
  const tx=new THREE.CanvasTexture(cv); tx.colorSpace=THREE.SRGBColorSpace;
  tx.wrapS=THREE.RepeatWrapping; tx.repeat.x=2; return tx;
}
function gradientTex(){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64;
  const g=cv.getContext('2d');
  for(let x=0;x<256;x++){ g.fillStyle=`hsl(${x/256*360},78%,62%)`; g.fillRect(x,0,1,64); }
  const t=new THREE.CanvasTexture(cv);
  t.colorSpace=THREE.SRGBColorSpace; t.wrapS=THREE.RepeatWrapping;
  return t;
}
// 吊り看板のアイコン（RPGの店っぽく）
function iconTex(bg,draw){
  const cv=document.createElement('canvas'); cv.width=cv.height=128;
  const g=cv.getContext('2d');
  g.fillStyle=bg; g.beginPath(); g.arc(64,64,60,0,Math.PI*2); g.fill();
  g.strokeStyle='#5e3d22'; g.lineWidth=7;
  g.beginPath(); g.arc(64,64,56,0,Math.PI*2); g.stroke();
  g.fillStyle='#ffffff'; g.strokeStyle='#ffffff'; g.lineWidth=8; g.lineCap='round';
  draw(g);
  const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const SIGN_TEX=[
  iconTex('#b55a2a',g=>{ g.fillRect(42,46,34,38); g.beginPath(); g.arc(82,64,12,-1.3,1.3); g.stroke(); }),                 // マグ
  iconTex('#c79a4a',g=>{ g.beginPath(); g.ellipse(64,66,30,18,0,0,Math.PI*2); g.fill(); }),                                // パン
  iconTex('#4a7d9d',g=>{ g.fillRect(58,36,12,16); g.beginPath(); g.moveTo(48,86); g.lineTo(64,52); g.lineTo(80,86); g.closePath(); g.fill(); }), // ポーション
  iconTex('#6a7176',g=>{ g.beginPath(); g.moveTo(64,32); g.lineTo(64,84); g.moveTo(50,72); g.lineTo(78,72); g.stroke(); }), // 剣
  iconTex('#3a8aa8',g=>{ g.beginPath(); g.ellipse(60,64,24,12,0,0,Math.PI*2); g.fill(); g.beginPath(); g.moveTo(82,64); g.lineTo(96,52); g.lineTo(96,76); g.closePath(); g.fill(); }), // 魚
  iconTex('#8a5a33',g=>{ g.fillRect(52,36,16,32); g.fillRect(52,62,32,20); })                                              // ブーツ
];
const cobbleRoad=cobbleTex(['#8e9398','#84898e','#989da2','#7c8186'],'#62666a');
const cobbleWalk=cobbleTex(['#c4c8ca','#b9bdbf','#cdd1d3','#aeb3b6'],'#979ca0');
const grassTex=noiseTex('#7ecb5a',[['#69b54a',500,1,3],['#8fd96a',260,1,2.4]]);
const paveTex=tileTex('#c9cccf','#b4b8ba',64);
const dirtTex=noiseTex('#d8cdb4',[['#c9bda0',260,1,3]]);
const gradTex=gradientTex();

function patch(w,d,x,z,tex,y=0.015,texScale=4){
  const t=tex.clone(); t.needsUpdate=true; t.repeat.set(w/texScale,d/texScale);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),
    new THREE.MeshLambertMaterial({map:t}));
  m.rotation.x=-Math.PI/2; m.position.set(x,y,z); m.receiveShadow=true; scene.add(m);
}

/* ============================================================
   地面と道路（すべて石畳のRPGタウン）
   ============================================================ */
{
  const t=cobbleWalk.clone(); t.needsUpdate=true; t.repeat.set(180,180);
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(900,900),
    new THREE.MeshLambertMaterial({map:t}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
}
patch(125,125,-75,75,grassTex,0.015,5);
patch(120,110,-72,-70,grassTex,0.015,5);
patch(44,30,-58,-42,cobbleWalk,0.03,3);
patch(70,16,-48,16,grassTex,0.03,5);
patch(64,52,52,80,cobbleWalk,0.035,3);
patch(220,170,0,-260,grassTex,0.012,6);   // 北門の外の草原
patch(8,70,0,-170,dirtTex,0.025,3);       // 城への道

{ // 街路（石畳・少し濃い）
  const t=cobbleRoad.clone(); t.needsUpdate=true; t.repeat.set(3,86);
  const mat=new THREE.MeshLambertMaterial({map:t});
  const rA=new THREE.Mesh(new THREE.BoxGeometry(11,0.05,290),mat);
  rA.rotation.y=Math.PI/2; rA.position.y=0.025; rA.receiveShadow=true; scene.add(rA);
  const rB=new THREE.Mesh(new THREE.BoxGeometry(11,0.05,290),mat);
  rB.position.y=0.025; rB.receiveShadow=true; scene.add(rB);
  const rN=new THREE.Mesh(new THREE.BoxGeometry(11,0.05,76),mat.clone());
  rN.position.set(0,0.02,-172); rN.receiveShadow=true; scene.add(rN);
}

/* ---------- クラシックな街灯（ランタン） ---------- */
const lampPos=[];
for(let x=-128;x<134;x+=22){ if(Math.abs(x)>10){ lampPos.push([x,-7.4]); lampPos.push([x+11,7.4]); } }
for(let z=-128;z<134;z+=22){ if(Math.abs(z)>10){ lampPos.push([-7.4,z]); lampPos.push([7.4,z+11]); } }
const lpPole=collector(),lpLant=collector(),lpCap=collector(),lpBask=collector();
lampPos.forEach((p,i)=>{
  lpPole.add(p[0],1.9,p[1]); lpLant.add(p[0],3.85,p[1]); lpCap.add(p[0],4.18,p[1]);
  if(i%2===0) lpBask.add(p[0],2.7,p[1]);
  circleCol(p[0],p[1],0.3);
});
lpPole.build(new THREE.CylinderGeometry(0.07,0.12,3.8,7),lam(C.lamp),{shadow:true});
lpLant.build(new THREE.BoxGeometry(0.34,0.42,0.34),bas(0xffe9b0));
lpCap.build(new THREE.ConeGeometry(0.32,0.3,4),lam(C.lamp));
lpBask.build(new THREE.SphereGeometry(0.28,8,6),lam(0xe586b4));

/* ============================================================
   木組みの家（RPGの民家・全パーツInstancedMesh）
   ============================================================ */
const hBody=collector(),hFound=collector(),hRoof=collector(),hChim=collector();
const hWin=collector(),hBeamV=collector(),hBeamH=collector(),hDoor=collector(),hStep=collector();
const flowerC=collector(), fboxC=collector();
const signMeshes=[];
const roofShape=new THREE.Shape();
roofShape.moveTo(-0.5,0); roofShape.lineTo(0.5,0); roofShape.lineTo(0,1); roofShape.closePath();
const roofGeo=new THREE.ExtrudeGeometry(roofShape,{depth:1,bevelEnabled:false});
roofGeo.translate(0,0,-0.5); roofGeo.rotateY(Math.PI/2);
let hIdx=0,signIdx=0;
function house(cx,cz,fry,w,d,h,{sign=false}={}){
  const wall=WALLS[hIdx%WALLS.length];
  const roof=ROOFS[(hIdx*2+1)%ROOFS.length];
  const timber=(hIdx%3)!==2;
  hIdx++;
  hFound.add(cx,0.3,cz,fry,w+0.25,0.6,d+0.25);
  hBody.add(cx,h/2+0.5,cz,fry,w,h,d,wall);
  hRoof.add(cx,h+0.48,cz,fry,w+0.7,1.0+(hIdx%4)*0.22,d+0.85,roof);
  if(hIdx%2===0){
    const [chx,chz]=loc(cx,cz,fry,w*0.26,0);
    hChim.add(chx,h+1.5,chz,fry,1,0.9+(hIdx%3)*0.4,1);
  }
  // 正面：窓・木組み梁・ドア・フラワーボックス
  const floors=Math.max(1,Math.floor((h-1.4)/2.2));
  const cols=Math.max(1,Math.floor((w-1.4)/1.8));
  for(let f=0;f<floors;f++){
    for(let c2=0;c2<cols;c2++){
      const u=(c2-(cols-1)/2)*1.8;
      if(f===0 && Math.abs(u)<0.8) continue; // ドアの位置
      const y=1.6+f*2.2;
      const [wx,wz]=loc(cx,cz,fry,u,d/2+0.05);
      hWin.add(wx,y,wz,fry);
      if(f===0 && (hIdx+c2)%2===0){
        const [bx,bz]=loc(cx,cz,fry,u,d/2+0.18);
        fboxC.add(bx,y-0.75,bz,fry);
        for(let k=0;k<3;k++){
          const [fx2,fz2]=loc(cx,cz,fry,u-0.28+k*0.28,d/2+0.2);
          flowerC.add(fx2,y-0.55,fz2,0,1,1,1,FLOWER_COLORS[(hIdx+k)%FLOWER_COLORS.length]);
        }
      }
    }
  }
  if(timber){
    [-(w/2-0.12),w/2-0.12].forEach(lx=>{
      const [bx,bz]=loc(cx,cz,fry,lx,d/2+0.06);
      hBeamV.add(bx,h/2+0.5,bz,fry,1,h*0.95,1);
    });
    [[h*0.5+0.5],[h+0.32]].forEach(([y])=>{
      const [bx,bz]=loc(cx,cz,fry,0,d/2+0.06);
      hBeamH.add(bx,y,bz,fry,w*0.97,1,1);
    });
  }
  const [dx2,dz2]=loc(cx,cz,fry,0,d/2+0.07);
  hDoor.add(dx2,1.5,dz2,fry);
  const [sx2,sz2]=loc(cx,cz,fry,0,d/2+0.35);
  hStep.add(sx2,0.12,sz2,fry);
  if(sign){
    const [px2,pz2]=loc(cx,cz,fry,Math.min(w/2-0.5,1.6),d/2+0.45);
    const [ax2,az2]=loc(cx,cz,fry,Math.min(w/2-0.5,1.6),d/2+0.2);
    box(0.08,0.08,0.8,C.woodD,(px2+ax2)/2,3.0,(pz2+az2)/2,{ry:fry,shadow:false});
    const board=new THREE.Mesh(new THREE.PlaneGeometry(0.95,0.95),
      new THREE.MeshLambertMaterial({map:SIGN_TEX[signIdx%SIGN_TEX.length],side:THREE.DoubleSide,transparent:true}));
    const a=fry+Math.PI/2;
    board.rotation.y=a; board.position.set(px2,2.45,pz2);
    scene.add(board); signMeshes.push(board); signIdx++;
  }
  const s=Math.abs(Math.sin(fry))>0.5;
  const ex=s?d/2:w/2, ez=s?w/2:d/2;
  boxCol(cx-ex,cx+ex,cz-ez,cz+ez);
}
/* ---- 通り沿いの家並み（連続したファサード） ---- */
function rowAlongX(zc,fry,x0,x1,skips){
  let x=x0;
  while(x<x1-5){
    const w=6+(Math.floor(Math.random()*3))*1.4;
    const d=6+Math.random()*2;
    const h=3.2+Math.floor(Math.random()*3)*1.5;
    const cxh=x+w/2;
    if(!skips.some(([a,b])=>cxh+w/2>a&&cxh-w/2<b))
      house(cxh,zc,fry,w,d,h,{sign:Math.random()<0.32});
    x+=w+1.2;
  }
}

function garland(x1,y1,z1,x2,y2,z2,mode='pen',n=12){
  const L=Math.hypot(x2-x1,z2-z1);
  const sag=L*0.085;
  const pts=[];
  for(let i=0;i<=20;i++){
    const u=i/20;
    pts.push(new THREE.Vector3(x1+(x2-x1)*u,y1+(y2-y1)*u-sag*4*u*(1-u),z1+(z2-z1)*u));
  }
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat));
  const a=Math.atan2(-(z2-z1),(x2-x1));
  for(let i=0;i<n;i++){
    const u=(i+0.5)/n;
    const px=x1+(x2-x1)*u,pz=z1+(z2-z1)*u;
    const py=y1+(y2-y1)*u-sag*4*u*(1-u);
    if(mode==='pen') penC.add(px,py,pz,a,1,1,1,PEN_COLORS[(penIdx++)%PEN_COLORS.length]);
    else bulbC.add(px,py-0.07,pz);
  }
}

      joy={id:t.identifier,ox:t.clientX,oy:t.clientY,vx:0,vy:0};

      joyKnob.style.display='block';
      joyKnob.style.left=(t.clientX-24)+'px'; joyKnob.style.top=(t.clientY-24)+'px';
    } else if(!look){
      look={id:t.identifier,lx:t.clientX,ly:t.clientY};
    }
  }
  e.preventDefault();
},{passive:false});
renderer.domElement.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id){
      let dx=t.clientX-joy.ox,dy=t.clientY-joy.oy;
      const d=Math.hypot(dx,dy),max=48;
      if(d>max){ dx*=max/d; dy*=max/d; }
      joy.vx=dx/max; joy.vy=dy/max;
      joyKnob.style.left=(joy.ox+dx-24)+'px'; joyKnob.style.top=(joy.oy+dy-24)+'px';
    } else if(look && t.identifier===look.id){
      lookDelta(t.clientX-look.lx,t.clientY-look.ly,0.005);
      look.lx=t.clientX; look.ly=t.clientY;
    }
  }
  e.preventDefault();
},{passive:false});
function endTouch(e){
  for(const t of e.changedTouches){
    if(joy && t.identifier===joy.id){ joy=null; joyBase.style.display='none'; joyKnob.style.display='none'; }

function collide(){
  for(const c of colliders){
    if(c.t==='c'){
      const dx=player.x-c.x,dz=player.z-c.z,rr=c.r+R,d2=dx*dx+dz*dz;
      if(d2<rr*rr && d2>1e-8){
        const d=Math.sqrt(d2);
        player.x=c.x+dx/d*rr; player.z=c.z+dz/d*rr;
      }
    } else {
      const nx=Math.max(c.x0,Math.min(player.x,c.x1));
      const nz=Math.max(c.z0,Math.min(player.z,c.z1));
      const dx=player.x-nx,dz=player.z-nz,d2=dx*dx+dz*dz;
      if(d2<R*R){
        if(d2>1e-8){
          const d=Math.sqrt(d2);
          player.x=nx+dx/d*R; player.z=nz+dz/d*R;
        } else {
          const pl=player.x-c.x0,pr=c.x1-player.x,pt=player.z-c.z0,pb=c.z1-player.z;
          const m=Math.min(pl,pr,pt,pb);
          if(m===pl)player.x=c.x0-R; else if(m===pr)player.x=c.x1+R;
          else if(m===pt)player.z=c.z0-R; else player.z=c.z1+R;
        }
      }
    }
  }
  player.x=Math.max(-131,Math.min(131,player.x));
  player.z=Math.max(-196,Math.min(131,player.z));
}

const clock=new THREE.Clock();
let mmTick=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  if(started){
    if(keys.ArrowLeft) player.yaw+=1.8*dt;
    if(keys.ArrowRight) player.yaw-=1.8*dt;
    if(keys.KeyQ) player.yaw+=1.8*dt;
    if(keys.KeyE) player.yaw-=1.8*dt;
    const sp=(keys.ShiftLeft||keys.ShiftRight?9:5)*dt;
    const fx=-Math.sin(player.yaw),fz=-Math.cos(player.yaw);
    const rx=Math.cos(player.yaw),rz=-Math.sin(player.yaw);
    let mx=0,mz=0;
    if(keys.KeyW||keys.ArrowUp){mx+=fx;mz+=fz;}
    if(keys.KeyS||keys.ArrowDown){mx-=fx;mz-=fz;}
    if(keys.KeyD){mx+=rx;mz+=rz;}
    if(keys.KeyA){mx-=rx;mz-=rz;}
    if(joy){ mx+=fx*(-joy.vy)+rx*joy.vx; mz+=fz*(-joy.vy)+rz*joy.vx; }
    const len=Math.hypot(mx,mz);
    if(len>0.01){
      const k=Math.min(len,1)/len;
      player.x+=mx*k*sp; player.z+=mz*k*sp; collide();
    }
  }
  camera.position.set(player.x,EYE,player.z);
  camera.rotation.set(player.pitch,player.yaw,0);

  const pos=pGeo.attributes.position.array;
  let pi=0;
  for(let k=0;k<jetCurves.length;k++){
    for(let j=0;j<P_PER;j++){
      const u=(j/P_PER+t*0.55+k*0.07)%1;
      const v=jetCurves[k].getPoint(u);
      pos[pi++]=v.x; pos[pi++]=v.y; pos[pi++]=v.z;
    }
  }
  pGeo.attributes.position.needsUpdate=true;
  waterSurf.position.y=0.91+Math.sin(t*2.2)*0.012;
  gradTex.offset.x=t*0.05;
  spotCones.forEach((p,i)=>{ p.rotation.y=Math.sin(t*0.7+i*1.3)*0.7+t*0.3; });
  if(windmillBlades) windmillBlades.rotation.z=t*0.55;
  {
    const cp=confGeo.attributes.position.array;
    for(let i=0;i<CONF_N;i++){
      cp[i*3+1]-=dt*(1.0+(i%5)*0.22);
      cp[i*3]+=Math.sin(t*2+i)*dt*0.4;
      if(cp[i*3+1]<0.2){
        cp[i*3+1]=8+Math.random()*2;
        cp[i*3]=36+Math.random()*32; cp[i*3+2]=58+Math.random()*26;
      }
    }
    confGeo.attributes.position.needsUpdate=true;
  }
  smokes.forEach(s=>{
    const sp2=s.g.attributes.position.array;
    for(let i=0;i<s.n;i++){
      sp2[i*3+1]+=dt*0.9;
      sp2[i*3]+=Math.sin(t+i)*dt*0.18;
      if(sp2[i*3+1]>s.y+3.4){
        sp2[i*3+1]=s.y;
        sp2[i*3]=s.x+(Math.random()-0.5)*s.spread;
        sp2[i*3+2]=s.z+(Math.random()-0.5)*s.spread;
      }
    }
    s.g.attributes.position.needsUpdate=true;
  });
  balloonGroups.forEach((g,i)=>{ g.position.y=Math.sin(t*1.4+i)*0.12; });
  flags.forEach((f,i)=>{ f.rotation.y=Math.sin(t*2.4+i)*0.22; });
  signMeshes.forEach((sm,i)=>{ sm.rotation.z=Math.sin(t*1.6+i*0.9)*0.08; });
  if(balloonShip){
    balloonShip.position.x=-60+Math.cos(t*0.045)*36;
    balloonShip.position.z=55+Math.sin(t*0.045)*30;
    balloonShip.position.y=66+Math.sin(t*0.4)*1.6;
    balloonShip.rotation.y=t*0.045+Math.PI/2;
  }
  for(const c of clouds){ c.position.x+=dt*1.2; if(c.position.x>260)c.position.x=-260; }
  if(++mmTick%3===0) drawMinimap();
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
